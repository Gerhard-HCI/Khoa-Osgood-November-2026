/* ── HEADER ── */
#app-header{flex-shrink:0;background-color:#0D2847;background-image:linear-gradient(160deg,#0F3160 0%,#0D2847 55%,#071B35 100%);border-bottom:1px solid rgba(255,255,255,.08)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px}
.hdr-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-flag{font-size:17px;flex-shrink:0}
.hdr-dest{font-family:var(--font-serif);font-size:14px;font-weight:300;letter-spacing:.4px;color:#fff;white-space:nowrap}
.hdr-hc{font-size:8px;color:rgba(255,255,255,.40);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}
.hdr-names{text-align:center;padding:0 14px 7px;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-name{font-family:var(--font-serif);font-size:19px;font-weight:300;letter-spacing:.6px;color:#fff;line-height:1.15}
.hdr-name2{font-size:8.5px;color:rgba(255,255,255,.45);letter-spacing:1.4px;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
#jst-clock{font-family:'SF Mono','Menlo',monospace;font-size:14px;font-weight:300;letter-spacing:1px;color:#fff;display:block;text-align:right;white-space:nowrap}
#trip-day-label{font-size:8.5px;color:rgba(255,255,255,.38);letter-spacing:.4px;margin-top:1px;display:block;text-align:right;white-space:nowrap}

/* ── TAB NAV ── */
.tab-nav{display:flex;border-top:1px solid rgba(255,255,255,.07);overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.42);font-size:10.5px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;padding:9px 13px 7px;transition:color .18s,border-color .18s;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.tab-btn.active{color:var(--sakura);border-bottom-color:var(--sakura)}

/* ── MAIN CONTENT ── */
#main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel{display:none;padding:14px 14px 80px;animation:panelFade .22s ease both}
.tab-panel.active{display:block}
@keyframes panelFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── BANNER ── */
.trip-banner{background:linear-gradient(135deg,#0D2847 0%,#0A2040 55%,#04111F 100%);border-radius:var(--radius);padding:22px 20px 20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.trip-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E") repeat}
.trip-banner-kana{font-family:var(--font-serif);font-size:11px;font-style:italic;opacity:.55;letter-spacing:1px;margin-bottom:4px;position:relative}
.trip-banner h2{font-family:var(--font-serif);font-size:28px;font-weight:300;letter-spacing:1px;margin-bottom:4px;position:relative}
.trip-banner .banner-dates{font-size:13px;opacity:.72;position:relative}
.banner-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;position:relative}
.banner-chip{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:11px}
.banner-chip.confirmed{background:rgba(200,230,201,.25);border-color:rgba(200,230,201,.5)}

.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-4);padding:8px 2px 6px}

/* ── BOOKING LEGEND ── */
.booking-legend{display:flex;flex-wrap:wrap;gap:8px 14px;padding:10px 14px;background:var(--white);border-radius:var(--radius-md);margin-bottom:10px;border:1px solid var(--border-lt)}
.bl-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-3);font-weight:500}
.bl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.bl-dot.confirmed{background:#C8E6C9;border:1px solid rgba(27,94,32,.3)}
.bl-dot.requested{background:#80DEEA;border:1px solid rgba(0,77,86,.3)}
.bl-dot.self-booked{background:#FADADD;border:1px solid rgba(123,26,26,.3)}
.bl-dot.suggestion{background:#BBDEFB;border:1px solid rgba(13,60,110,.3)}
.bl-dot.walk-in{background:#FFF9E6;border:1px solid rgba(107,80,0,.3)}

/* ── DAY CARDS ── */
.day-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border-lt);animation:cardIn .28s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.day-card.is-today{border-color:var(--navy);box-shadow:0 0 0 1.5px var(--navy),var(--shadow)}
.day-card.is-past{opacity:.58}
.day-header{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.day-num{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--border-lt);color:var(--ink-3)}
.day-card.is-today .day-num{background:var(--navy);color:#fff}
.day-header-info{flex:1;min-width:0}
.day-name{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sub{font-size:11px;color:var(--ink-4);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.day-city-badge{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:5px;background:#EBF3FF;color:#1A5FAA}
.today-pill{font-size:10px;font-weight:700;background:var(--navy);color:#fff;padding:2px 8px;border-radius:20px}
.host-pill{font-size:10px;font-weight:600;background:rgba(176,124,34,.15);color:var(--gold);padding:2px 8px;border-radius:20px;border:1px solid rgba(176,124,34,.25)}
.day-chevron{color:var(--ink-4);font-size:14px;flex-shrink:0;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.day-card.open .day-chevron{transform:rotate(180deg)}
.day-body{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
.day-card.open .day-body{max-height:4000px}
.day-body-inner{padding:0 16px 16px}

.hotel-bar{display:flex;align-items:center;gap:10px;border-radius:var(--radius-md);padding:10px 13px;margin-bottom:12px;background:#EBF4FF;border-left:3px solid #0D2847}
.hb-name{font-size:12px;font-weight:600;color:#0D2847}
.hb-detail{font-size:11px;color:#1A3F6F;margin-top:1px}
.hb-link{margin-left:auto;font-size:11px;font-weight:500;flex-shrink:0;color:#0D2847}

.day-note-bar{background:var(--navy-lt);border-radius:var(--radius-md);border-left:3px solid #4A80C0;padding:10px 13px;font-size:12px;color:var(--ink-2);line-height:1.55;margin-bottom:12px}

.weather-widget{display:flex;align-items:center;gap:10px;background:var(--gold-lt);border-radius:var(--radius-md);border:1px solid rgba(176,124,34,.15);padding:10px 13px;margin-bottom:14px}
.wx-icon{font-size:26px}.wx-info{flex:1}.wx-temp{font-size:14px;font-weight:600}.wx-desc{font-size:11px;color:var(--ink-3);margin-top:2px}.wx-rain{font-size:12px;font-weight:500;color:#1D6FAD;flex-shrink:0}
.wx-loading{font-size:12px;color:var(--ink-4);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:75px}
.stop-item{position:relative;margin-bottom:14px}
.stop-item::after{content:'';position:absolute;left:-16px;top:29px;bottom:-14px;width:2px;background:var(--border);z-index:1}
.stop-item:last-child::after{display:none}
.stop-time{position:absolute;left:-70px;top:11px;width:42px;text-align:right;font-size:10px;font-weight:600;color:var(--ink-4);line-height:1.4}
.stop-dot{position:absolute;left:-25px;top:9px;width:18px;height:18px;border-radius:50%;border:2.5px solid #ccc;background:#fff;z-index:2}
.stop-dot.t-restaurant{border-color:#8B1A1A;background:#F8EDED}
.stop-dot.t-activity{border-color:#6650CC;background:#EEE8FF}
.stop-dot.t-transport{border-color:#0D2847;background:#EEF4FF}
.stop-dot.t-hotel{border-color:#2E7D32;background:#E8F5E9}
.stop-dot.t-flight{border-color:#0277BD;background:#E1F5FE}
.stop-dot.t-suggestion{border-color:#1565C0;background:#E3F2FD}
.stop-dot.t-pending{border-color:#607D8B;background:#ECEFF1}
.stop-card{background:var(--cream);border-radius:var(--radius-md);border:1px solid var(--border-lt);padding:11px 13px}
.stop-card.is-suggestion{background:#F0F7FF;border-color:rgba(21,101,192,.15)}
.stop-card.is-pending{background:#F5F5F5;border-color:rgba(96,125,139,.15)}
.stop-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.stop-title-wrap{flex:1;min-width:0}
.stop-icon{font-size:13px;margin-right:5px}
.stop-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.stop-subtitle{font-size:11px;color:var(--ink-3);margin-top:2px}

/* ── BOOKING STATUS BADGES ── */
.stop-badge{font-size:9.5px;font-weight:600;padding:3px 9px;border-radius:5px;flex-shrink:0;white-space:nowrap;letter-spacing:.1px}
.stop-badge.confirmed  {background:#C8E6C9;color:#1B5E20;border:1px solid rgba(27,94,32,.18)}
.stop-badge.requested  {background:#80DEEA;color:#004D56;border:1px solid rgba(0,77,86,.18)}
.stop-badge.self-booked{background:#FADADD;color:#7B1A1A;border:1px solid rgba(123,26,26,.18)}
.stop-badge.suggestion {background:#BBDEFB;color:#0D3C6E;border:1px solid rgba(13,60,110,.18)}
.stop-badge.walk-in    {background:#FFF9E6;color:#6B5000;border:1px solid rgba(107,80,0,.18)}
.stop-badge.pending    {background:#ECEFF1;color:#546E7A;border:1px solid rgba(84,110,122,.2)}
.stop-badge.logistics  {background:#FFE0B2;color:#BF360C;border:1px solid rgba(191,54,12,.18)}

.stop-notes{font-size:12px;color:var(--ink-2);line-height:1.55;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-lt)}
.stop-alert{display:flex;align-items:flex-start;gap:6px;margin-top:8px;padding:7px 10px;background:#FFFBEB;border-radius:var(--radius-sm);border-left:3px solid #F59E0B;font-size:11px;color:#92400E;font-weight:500;line-height:1.4}
.map-actions{display:flex;gap:5px;margin-top:10px}
.map-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 5px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;min-height:34px;border:1px solid var(--border);background:var(--white);color:var(--ink-2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.map-btn:active{transform:scale(.96)}
.map-btn.map-disabled{color:var(--border);cursor:default;background:var(--border-lt);border-color:var(--border-lt);pointer-events:none;opacity:.4}
.map-btn.mp{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}

/* ── UTILITIES ── */
.util-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border-lt);margin-bottom:12px}
.util-card-title{font-family:var(--font-serif);font-size:18px;font-weight:400;color:var(--ink);margin-bottom:14px;letter-spacing:.3px}
.fx-row{display:flex;gap:8px;align-items:flex-end}
.fx-group{flex:1}
.fx-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-4);margin-bottom:5px}
.fx-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:18px;font-weight:500;color:var(--ink);background:var(--cream);outline:none;-webkit-appearance:none}
.fx-input:focus{border-color:var(--navy)}
.fx-swap-btn{width:38px;height:38px;border-radius:50%;background:var(--navy-lt);border:none;color:var(--navy);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:1px;cursor:pointer}
.fx-rate-note{font-size:11px;color:var(--ink-4);text-align:center;margin-top:10px;line-height:1.5}
.info-list{list-style:none}
.info-list li{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--border-lt);font-size:13px;line-height:1.55}
.info-list li:last-child{border-bottom:none;padding-bottom:0}
.info-emoji{font-size:17px;flex-shrink:0;margin-top:1px}
.info-text{color:var(--ink-2)}
.info-text strong{color:var(--ink);display:block;margin-bottom:1px}
.rule-item{padding:9px 0;border-bottom:1px solid var(--border-lt);display:flex;gap:10px;font-size:12.5px;line-height:1.5}
.rule-item:last-child{border-bottom:none}
.rule-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.rule-text strong{color:var(--ink)}

/* ── WISH LIST ── */
.wishlist-banner{background:linear-gradient(135deg,#4A1942 0%,#2D0F27 100%);border-radius:var(--radius);padding:22px 20px 18px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.wishlist-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E") repeat}
.wishlist-banner h2{font-family:var(--font-serif);font-size:26px;font-weight:300;letter-spacing:.8px;margin-bottom:4px;position:relative}
.wishlist-banner p{font-size:12px;opacity:.65;position:relative}
.wish-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border-lt);overflow:hidden}
.wish-row{display:flex;align-items:center;gap:14px;padding:14px 16px}
.wish-num{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4A1942,#2D0F27);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wish-info{flex:1;min-width:0}
.wish-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.2}
.wish-style{font-size:10.5px;color:var(--ink-4);margin-top:2px}
.wish-status{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap;margin-top:3px;display:inline-block}
.wish-status.confirmed{background:#C8E6C9;color:#1B5E20;border:1px solid rgba(27,94,32,.2)}
.wish-status.requested{background:#80DEEA;color:#004D56;border:1px solid rgba(0,77,86,.2)}
.wish-status.priority{background:#FCE4EC;color:#880E4F;border:1px solid rgba(136,14,79,.2)}
.wish-actions{display:flex;gap:6px;flex-shrink:0}
.wish-map-btn{padding:7px 11px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--ink-2);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.wish-divider{height:1px;background:var(--border-lt);margin:0}

/* ── VISITED ── */
.visited-banner{background:linear-gradient(135deg,#1A3A2A 0%,#0D2018 100%);border-radius:var(--radius);padding:22px 20px 18px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.visited-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E") repeat}
.visited-banner h2{font-family:var(--font-serif);font-size:26px;font-weight:300;letter-spacing:.8px;margin-bottom:4px;position:relative}
.visited-banner p{font-size:12px;opacity:.65;position:relative}
.visited-year{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);padding:10px 2px 6px;margin-top:6px}
.visited-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border-lt);overflow:hidden}
.visited-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border-lt)}
.visited-row:last-child{border-bottom:none}
.visited-num{width:24px;height:24px;border-radius:50%;background:var(--navy-lt);color:var(--navy);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.visited-info{flex:1;min-width:0}
.visited-name{font-size:13px;font-weight:600;color:var(--ink)}
.visited-meta{font-size:10.5px;color:var(--ink-4);margin-top:1px}
.visited-meal-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:4px}
.mb-lunch{background:#FFF9E6;color:#6B5000}
.mb-dinner{background:#F3E5F5;color:#4A148C}

/* ── EMERGENCY ── */
.emergency-banner{background:var(--navy);border-radius:var(--radius);padding:18px 20px;color:#fff;margin-bottom:14px;text-align:center}
.emergency-banner h2{font-family:var(--font-serif);font-size:22px;font-weight:300;letter-spacing:.5px;margin-bottom:4px}
.emergency-banner p{font-size:12px;opacity:.75}
.contact-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border-lt);margin-bottom:12px}
.contact-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border-lt);gap:10px}

/* ── WEATHER ── */
function wmo(c){
  if(c===0)        return{i:'☀️',d:'Clear sky'};
  if(c<=2)         return{i:'⛅',d:'Partly cloudy'};
  if(c===3)        return{i:'☁️',d:'Overcast'};
  if(c>=45&&c<=48) return{i:'🌫️',d:'Foggy'};
  if(c>=51&&c<=67) return{i:'🌧️',d:'Rain'};
  if(c>=80&&c<=82) return{i:'🌦️',d:'Showers'};
  if(c>=95)        return{i:'⛈️',d:'Thunderstorm'};
  return{i:'🌤️',d:'Mixed'};
}
function loadWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia%2FTokyo&forecast_days=16';
  fetch(url).then(function(r){return r.json();}).then(function(data){
    data.daily.time.forEach(function(date,i){
      var el=document.getElementById('wx-'+date);
      if(!el)return;
      var e=wmo(data.daily.weathercode[i]);
      var hi=Math.round(data.daily.temperature_2m_max[i]);
      var lo=Math.round(data.daily.temperature_2m_min[i]);
      var rain=data.daily.precipitation_probability_max[i]||0;
      el.innerHTML='<span class="wx-icon">'+e.i+'</span>'
        +'<div class="wx-info"><div class="wx-temp">'+hi+'° / '+lo+'°C &middot; '+e.d+'</div>'
        +'<div class="wx-desc">Tokyo &middot; November</div></div>'
        +'<div class="wx-rain">&#x1F4A7; '+rain+'%</div>';
    });
  }).catch(function(){
    TRIP.days.forEach(function(d){
      var el=document.getElementById('wx-'+d.date);
      if(el)el.innerHTML='<span class="wx-icon">🍂</span>'
        +'<div class="wx-info"><div class="wx-temp" style="font-size:13px">November Tokyo &middot; 10–18°C</div>'
        +'<div class="wx-desc">Crisp autumn &middot; Peak ginkgo season &middot; Excellent visibility</div></div>';
    });
  });
}

function nav(q){return(q&&q.indexOf('http')===0)?q:'https://maps.google.com/maps?daddr='+encodeURIComponent(q||'Tokyo Japan')+'&dirflg=d';}

/* ── TOAST ── */
var toastTm;
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTm);toastTm=setTimeout(function(){el.classList.remove('show');},2200);}
window.copyAddr=function(di,si){
  var stop=TRIP.days[di].stops[si];
  var txt=(stop.addr&&stop.addr!=='Tokyo')?stop.addr:stop.loc;
  if(!txt)return;
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(function(){showToast('Address copied');});}
  else{var ta=document.createElement('textarea');ta.value=txt;ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Address copied');}
};

/* ── CLOCK ── */
function jst(){return new Date(Date.now()+9*3600000);}
function isoToday(){return jst().toISOString().slice(0,10);}
function tickClock(){
  var d=jst();
  document.getElementById('jst-clock').textContent=String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
  var today=d.toISOString().slice(0,10),found=null;
  for(var i=0;i<TRIP.days.length;i++){if(TRIP.days[i].date===today){found=TRIP.days[i];break;}}
  var lbl=document.getElementById('trip-day-label');
  if(found)lbl.textContent='Day '+found.dayNum+' of 8 \u00b7 Tokyo';
  else if(today<TRIP.startDate){var ms=new Date(TRIP.startDate)-new Date(today);lbl.textContent=Math.ceil(ms/86400000)+'d to Tokyo';}
  else if(today>TRIP.endDate)lbl.textContent='Journey complete \u00b7 Sayonara!';
  else lbl.textContent='Japan Standard Time';
}

  var btn=e.target.closest('.tab-btn');if(!btn)return;
  var name=btn.getAttribute('data-tab');
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-tab')===name);});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.toggle('active',p.id==='tab-'+name);});
});

/* ── TOGGLE DAY ── */
window.toggleDay=function(num){var c=document.getElementById('day-'+num);if(c)c.classList.toggle('open');};

/* ── ESCAPE ── */
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var ICONS={flight:'✈️',transport:'🚄',hotel:'🏨',restaurant:'🍽️',activity:'🎌',market:'🏪',suggestion:'🍽️'};

/* ── RENDER STOP ──────────────────────────────────────────
   KEY RULE: suggestion type → name hidden, NO map links
────────────────────────────────────────────────────────── */
function renderStop(stop,di,si){
  var isSuggestion=stop.badgeType==='pending'||stop.badgeType==='suggestion';
  var isActionable=!isSuggestion&&(stop.badgeType==='confirmed'||stop.badgeType==='logistics'||stop.badgeType==='requested'||stop.badgeType==='self-booked'||stop.badgeType==='walk-in');
  var hasLoc=!!(stop.q||stop.loc);
  var icon=ICONS[stop.type]||'📍';
  var badge=stop.badge?'<span class="stop-badge '+stop.badgeType+'">'+esc(stop.badge)+'</span>':'';
  var dotClass=isSuggestion?'t-pending':('t-'+(stop.type||'restaurant'));
  var cardClass=isSuggestion?' is-pending':'';  // pending = not yet confirmed or requested

  /* Map buttons: only active for non-suggestion types with a location */
  var mapHTML=isActionable&&hasLoc
    ?'<a href="'+gm(stop.q)+'" target="_blank" rel="noopener" class="map-btn mp">&#x1F4CD; Maps</a>'
      +'<a href="'+nav(stop.q)+'" target="_blank" rel="noopener" class="map-btn">&#x1F9ED; Nav</a>'
      +'<button class="map-btn" onclick="copyAddr('+di+','+si+')">&#10063; Copy</button>'
    :'<span class="map-btn map-disabled">&#x1F4CD;</span>'
      +'<span class="map-btn map-disabled">&#x1F9ED;</span>'
      +'<span class="map-btn map-disabled">&#10063;</span>';

  return '<div class="stop-item">'
    +'<div class="stop-time">'+(stop.time?stop.time.replace('~',''):'')+'</div>'
    +'<div class="stop-dot '+dotClass+'"></div>'
    +'<div class="stop-card'+cardClass+'"><div class="stop-top">'
    +'<div class="stop-title-wrap">'
    +'<div class="stop-title"><span class="stop-icon">'+icon+'</span>'+esc(stop.title)+'</div>'
    +(stop.sub?'<div class="stop-subtitle">'+esc(stop.sub)+'</div>':'')
    +'</div>'+badge+'</div>'
    +(stop.notes?'<div class="stop-notes">'+esc(stop.notes)+'</div>':'')
    +(stop.alert?'<div class="stop-alert">&#9888; '+esc(stop.alert)+'</div>':'')
    +'<div class="map-actions">'+mapHTML+'</div>'
    +'</div></div>';
}

/* ── RENDER ITINERARY ── */
function renderItinerary(){
  var today=isoToday();
  var html='<div class="trip-banner">'
    +'<div class="trip-banner-kana">A Private Culinary Journey &middot; Happy Camper Ltd.</div>'
    +'<h2>Tokyo</h2>'
    +'<div class="banner-dates">8 – 15 November 2026 &middot; Four Guests &middot; 7 Nights</div>'
    +'<div class="banner-chips">'
    +'<span class="banner-chip confirmed">&#x1F363; Sushi Saito &middot; Confirmed</span>'
    +'<span class="banner-chip confirmed">&#x1F363; Sushi Ikkou &middot; Confirmed</span>'
    +'<span class="banner-chip confirmed">&#x1F35C; Naruse &middot; Confirmed</span>'
    +'<span class="banner-chip">&#x1F4C5; 6 Hosted Days</span>'
    +'<span class="banner-chip">&#x1F342; Autumn Tokyo</span>'
    +'</div></div>'
    +'<div class="booking-legend">'
    +'<span class="bl-item"><span class="bl-dot confirmed"></span>Confirmed</span>'
    +'<span class="bl-item"><span class="bl-dot requested"></span>Requested</span>'
    +'<span class="bl-item"><span class="bl-dot self-booked"></span>Self-booked</span>'
    +'<span class="bl-item"><span class="bl-dot suggestion"></span>Suggestion</span>'
    +'<span class="bl-item"><span class="bl-dot walk-in"></span>Walk-in</span>'
    +'<span class="bl-item"><span class="bl-dot" style="background:#ECEFF1;border:1px solid rgba(84,110,122,.3)"></span>Not Yet Confirmed</span>'
    +'</div>'
    +'<div class="section-label">Daily Itinerary</div>';

  TRIP.days.forEach(function(day,idx){
    var isToday=day.date===today;
    var isPast=day.date<today;
    var isOpen=isToday||(today<TRIP.startDate&&idx===0);
    var dining=day.stops.filter(function(s){return s.type==='restaurant'||s.type==='suggestion';}).length;
    html+='<div class="day-card'+(isToday?' is-today':'')+(isPast?' is-past':'')+(isOpen?' open':'')+'" id="day-'+day.dayNum+'" style="animation-delay:'+(idx*.04).toFixed(2)+'s">'
      +'<div class="day-header" onclick="toggleDay('+day.dayNum+')">'
      +'<div class="day-num">D'+day.dayNum+'</div>'
      +'<div class="day-header-info">'
      +'<div class="day-name">'+esc(day.weekday)+'</div>'
      +'<div class="day-sub"><span class="day-city-badge">'+day.city+'</span>'
      +(isToday?'<span class="today-pill">TODAY</span>':'')
      +(day.hosted?'<span class="host-pill">Hosted</span>':'')
      +(dining>0?'<span>'+dining+' dining</span>':'')
      +'</div></div><span class="day-chevron">&#9662;</span>'
      +'</div>'
      +'<div class="day-body"><div class="day-body-inner">';
    if(day.hotel){
      html+='<div class="hotel-bar">'
        +'<div style="font-size:15px">&#x1F3E8;</div>'
        +'<div style="flex:1"><div class="hb-name">'+esc(day.hotel)+'</div>'
        +'<div class="hb-detail">'+day.city+' &middot; Night '+day.dayNum+'</div></div>'
        +(day.hq?'<a href="'+gm(day.hq)+'" target="_blank" rel="noopener" class="hb-link">&#x1F4CD; Map</a>':'')
        +'</div>';
    }
    if(day.notes)html+='<div class="day-note-bar">'+esc(day.notes)+'</div>';
    html+='<div class="weather-widget" id="wx-'+day.date+'"><span class="wx-loading">Loading weather&#x2026;</span></div>'
      +'<div class="timeline">';
    day.stops.forEach(function(s,si){html+=renderStop(s,idx,si);});
    html+='</div></div></div></div>';
  });

  document.getElementById('tab-itinerary').innerHTML=html;
  TRIP.days.forEach(function(d){
    var el=document.getElementById('wx-'+d.date);
    if(el)el.innerHTML='<span class="wx-icon">&#x1F342;</span>'
      +'<div class="wx-info"><div class="wx-temp" style="font-size:13px">November Tokyo &middot; 10–18&deg;C</div>'
      +'<div class="wx-desc">Crisp autumn &middot; Peak ginkgo season &middot; Excellent visibility</div></div>';
  });
  try{loadWeather();}catch(e){}
}

/* ── RENDER WISH LIST ── */
function renderWishlist(){
  var html='<div class="wishlist-banner"><h2>&#x1F374; Wish List &mdash; Nov 2026</h2><p>Programme targets and long-term priority restaurants</p></div>'
    +'<div class="section-label">This Trip &mdash; November 2026</div><div class="wish-card">';
  WISHLIST_TRIP.forEach(function(w,i){
    if(i>0)html+='<div class="wish-divider"></div>';
    var stCls=w.status==='confirmed'?'confirmed':w.status==='requested'?'requested':'priority';
    var stLabel=w.status==='confirmed'?'&#x2713; Confirmed':w.status==='requested'?'Requested':'&#x26A1; Priority';
    html+='<div class="wish-row">'
      +'<div class="wish-num">'+(i+1)+'</div>'
      +'<div class="wish-info"><div class="wish-name">'+esc(w.name)+'</div>'
      +'<div class="wish-style">'+esc(w.style)+'</div>'
      +'<span class="wish-status '+stCls+'">'+stLabel+'</span></div>'
      +'<div class="wish-actions"><a href="'+gm(w.q)+'" target="_blank" rel="noopener" class="wish-map-btn">&#x1F4CD;</a></div>'
      +'</div>';
  });
  html+='</div><div class="section-label">Long-term Priority</div><div class="wish-card">';
  WISHLIST_LONGTERM.forEach(function(w,i){
    if(i>0)html+='<div class="wish-divider"></div>';
    html+='<div class="wish-row">'
      +'<div class="wish-num" style="background:linear-gradient(135deg,#0D2847,#071B35)">'+(i+1)+'</div>'
      +'<div class="wish-info"><div class="wish-name">'+esc(w.name)+'</div>'

      +'</div>';

  html+='</div>';
  document.getElementById('tab-wishlist').innerHTML=html;
}

/* ── RENDER VISITED ── */
function renderVisited(){
  var total=(VISITED['2025']||[]).length+(VISITED['2024']||[]).length;
  var html='<div class="visited-banner"><h2>&#x2713; Previously Visited</h2><p>'+total+' meals across 2024 &ndash; 2025 &middot; Japan</p></div>';
  Object.keys(VISITED).sort(function(a,b){return b-a;}).forEach(function(year){
    html+='<div class="visited-year">'+year+'</div><div class="visited-card">';
    VISITED[year].forEach(function(v,i){
      if(i>0)html+='<div class="wish-divider"></div>';
      var mCls=v.meal==='Lunch'?'mb-lunch':'mb-dinner';
      html+='<div class="visited-row">'
        +'<div class="visited-num">'+v.num+'</div>'
        +'<div class="visited-info"><div class="visited-name">'+esc(v.name)+'<span class="visited-meal-badge '+mCls+'">'+v.meal+'</span></div>'
        +'<div class="visited-meta">'+esc(v.type)+'</div></div>'
        +'<a href="'+gm(v.name+' restaurant Japan')+'" target="_blank" rel="noopener" class="wish-map-btn" style="font-size:16px;padding:4px 8px">&#x1F4CD;</a>'
        +'</div>';
    });
    html+='</div>';
  });
  document.getElementById('tab-visited').innerHTML=html;
}
